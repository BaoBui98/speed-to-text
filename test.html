<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Realtime STT - Pipecat Optimized</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        #output {
            border: 1px solid #ccc;
            padding: 15px;
            min-height: 150px;
            background: #fafafa;
            margin-top: 20px;
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <h2>Realtime Speech-to-Text (PhoWhisper)</h2>
    <button id="start">Bắt đầu ghi âm</button>
    <button id="stop" disabled>Dừng</button>
    <h3>Kết quả dịch:</h3>
    <div id="output"></div>

    <script>
        let ws;
        let audioContext;
        let mediaStream;
        let audioWorkletNode;
        const SAMPLE_RATE = 16000;

        // Định nghĩa mã nguồn AudioWorklet xử lý luồng âm thanh dưới dạng inline Blob
        const workletCode = `
            class AudioProcessor extends AudioWorkletProcessor {
                process(inputs, outputs, parameters) {
                    const input = inputs[0];
                    if (input && input[0]) {
                        // Lấy dữ liệu kênh Mono đầu tiên truyền thẳng về Main Thread
                        this.port.postMessage(input[0]);
                    }
                    return true;
                }
            }
            registerProcessor('audio-processor', AudioProcessor);
        `;
        const workletUrl = URL.createObjectURL(new Blob([workletCode], { type: 'application/javascript' }));

        const stopAudio = () => {
            if (audioWorkletNode) audioWorkletNode.disconnect();
            if (audioContext && audioContext.state !== 'closed') audioContext.close();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (ws) ws.close();

            audioWorkletNode = null;
            audioContext = null;
            mediaStream = null;
            ws = null;

            document.getElementById("start").disabled = false;
            document.getElementById("stop").disabled = true;
        };

        document.getElementById("start").onclick = async () => {
            document.getElementById("start").disabled = true;
            document.getElementById("stop").disabled = false;
            document.getElementById("output").innerHTML = "";

            ws = new WebSocket("ws://127.0.0.1:8000/ws/transcribe");

            ws.onopen = async () => {
                console.log("Đã kết nối máy chủ STT");

                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: SAMPLE_RATE
                });

                // Đăng ký luồng xử lý AudioWorklet vào AudioContext
                await audioContext.audioWorklet.addModule(workletUrl);

                // Bật các bộ lọc phần cứng từ trình duyệt để tăng chất lượng giọng nói đầu vào
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                const source = audioContext.createMediaStreamSource(mediaStream);
                audioWorkletNode = new AudioWorkletNode(audioContext, 'audio-processor');

                // Lắng nghe mảng Float32 tuần tự từ Worker gửi về và chuyển tiếp qua WebSocket
                audioWorkletNode.port.onmessage = (event) => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        const float32Array = event.data;
                        ws.send(float32Array.buffer);
                    }
                };

                source.connect(audioWorkletNode);
                audioWorkletNode.connect(audioContext.destination);
            };

            ws.onmessage = (event) => {
                document.getElementById("output").innerHTML += event.data + "\n";
            };

            ws.onerror = (e) => console.error("Lỗi WebSocket:", e);
            ws.onclose = () => {
                console.log("Đã đóng kết nối máy chủ");
                stopAudio();
            };
        };

        document.getElementById("stop").onclick = () => {
            stopAudio();
        };
    </script>
</body>

</html>
